defaults:
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null

cluster:
  num_nodes: 1
  component_placement:
    actor,rollout,reward: all

runner:
  task_type: reasoning
  logger:
    log_path: ${runner.output_dir}/${runner.experiment_name}
    project_name: rlinf
    experiment_name: ${runner.experiment_name}
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 5
  max_steps: -1

  val_check_interval: 50
  save_interval: 200

  # Qwen3-4B: seq_length = prompt(1024) + response(15360) = 16384
  seq_length: 16384

  enable_dynamic_batch_size: False
  max_tokens_per_mbs: 16384

  resume_dir: null
  experiment_name: grpo-qwen3-4b-dapo-math
  output_dir: ../results

algorithm:
  group_size: 8

  n_minibatches: 4
  training_batch_size_per_gpu: 1
  rollout_batch_size_per_gpu: null

  logprob_forward_micro_batch_size: 1
  val_rollout_batch_size_per_gpu: 4

  recompute_logprobs: True
  shuffle_rollout: False

  # GRPO loss 参数
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  kl_penalty_type: low_var_kl
  ratio_clip_eps: 0.2
  entropy_bonus: 0.0
  calculate_entropy: False
  clip_ratio_c: null
  clip_ratio_low: null
  clip_ratio_high: null

  adv_type: grpo
  normalize_advantages: True
  early_stop_imp_ratio: 5.0
  use_valid_token_scale: False

  sampling_params:
    do_sample: True
    temperature: 1.0
    top_k: 1000000
    top_p: 1.0
    repetition_penalty: 1.0
    max_new_tokens: ${subtract:${runner.seq_length}, ${data.max_prompt_length}}
    min_new_tokens: 1

rollout:
  group_name: "RolloutGroup"

  gpu_memory_utilization: 0.65

  model:
    model_path: /workspace/volume/distributed-training-softdata/models/Qwen3-4B
    model_type: qwen3                 # dense model (not MoE)
    precision: ${actor.model.precision}

  enforce_eager: False
  distributed_executor_backend: mp
  disable_log_stats: False
  detokenize: False
  padding: null
  eos: null

  rollout_backend: sglang             # 和 e2e CI 配置一致

  sglang:
    attention_backend: triton
    decode_log_interval: 500000
    use_torch_compile: False
    torch_compile_max_bs: 128

  vllm:
    attention_backend: FLASH_ATTN
    enable_chunked_prefill: True
    enable_prefix_caching: True
    enable_flash_infer_sampler: True
    max_num_batched_tokens: null
    torch_profiler_dir: null

  return_logprobs: ${not:${algorithm.recompute_logprobs}}

  # 4B 模型小, TP=2 即可 (rollout 用 2 张 GPU)
  tensor_parallel_size: 2
  pipeline_parallel_size: 1

  validate_weight: False
  validate_save_dir: null
  print_outputs: True                  # 便于查看 rollout 输出

  max_running_requests: 128
  cuda_graph_max_bs: 128

data:
  type: math
  dataset_name: boba
  max_prompt_length: 1024
  filter_prompt_by_length: True
  rollout_batch_size: 256
  val_rollout_batch_size: null
  num_workers: 4
  prompt_key: prompt                   # ← 修复: DAPO 格式
  answer_key: label                    # ← 修复: DAPO 格式
  apply_chat_template: False
  shuffle: True
  validation_shuffle: True
  seed: 1234
  train_data_paths:
    - /workspace/volume/pengxiong/datasets/dapo-math-17k/dapo-math-17k.jsonl
  val_data_paths:
    - /workspace/volume/pengxiong/datasets/dapo-math-17k/dapo-math-17k.jsonl

actor:
  group_name: "ActorGroup"
  training_backend: megatron
  mcore_gpt: True
  spec_name: decoder_gpt

  offload_optimizer: True
  offload_weight: True
  offload_grad: True

  enable_dp_load_balance: False

  calculate_flops: False

  seed: 1234

  model:
    precision: fp16
    add_bias_linear: False

    # 8 GPU: TP=2 (分到 2 张卡), PP=1, DP=4
    tensor_model_parallel_size: 2
    pipeline_model_parallel_size: 1

    activation: swiglu
    sequence_parallel: True

    recompute_method: uniform
    recompute_granularity: full
    recompute_num_layers: 1

    seq_length: ${runner.seq_length}
    encoder_seq_length: ${runner.seq_length}

    normalization: rmsnorm

    position_embedding_type: rope

    apply_rope_fusion: True
    bias_dropout_fusion: False
    persist_layer_norm: False
    bias_activation_fusion: True
    attention_softmax_in_fp32: True
    batch_p2p_comm: False
    variable_seq_lengths: True
    gradient_accumulation_fusion: True
    moe_token_dispatcher_type: alltoall
    use_cpu_initialization: False

  optim:
    optimizer: adam
    bf16: False
    fp16: True
    lr: 2.0e-06
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-15
    min_lr: 2.0e-6
    weight_decay: 0.01
    use_distributed_optimizer: True
    overlap_grad_reduce: True
    overlap_param_gather: True
    optimizer_enable_pin: false
    overlap_param_gather_with_optimizer_step: False
    clip_grad: 1.0

  lr_sched:
    lr_warmup_fraction: 0.01
    lr_warmup_init: 0.0
    lr_warmup_iters: 0
    max_lr: 2.0e-6
    min_lr: 2.0e-6
    lr_decay_style: constant
    lr_decay_iters: 10

  tokenizer:
    tokenizer_model: ${rollout.model.model_path}
    use_fast: False
    trust_remote_code: True
    padding_side: 'right'

  megatron:
    ddp_bucket_size: null
    distributed_backend: nccl
    distributed_timeout_minutes: 30
    ckpt_format: torch
    use_dist_ckpt: False
    tp_comm_bootstrap_backend: nccl
    tp_comm_overlap_cfg: null
    use_hf_ckpt: True
    use_profiler: False

    ckpt_convertor:
      model: Qwen3-4B                                    # ← Megatron-Bridge 预注册的模型名
      hf_model_path: ${rollout.model.model_path}
      save_path: ${runner.output_dir}/${runner.experiment_name}/converted_ckpts/actor
      use_gpu_num: 0
      use_gpu_index: null
      process_num: 16
      tensor_model_parallel_size: ${actor.model.tensor_model_parallel_size}
      pipeline_model_parallel_size: ${actor.model.pipeline_model_parallel_size}
      te_ln_linear_qkv: True
      te_ln_linear_mlp_fc1: True
      te_ln_add_extra_state: 'tensor_pickle_none'

    profiler:
      output_dir: ${runner.output_dir}/${runner.experiment_name}/profiler
      activities: ["cpu", "cuda"]
      record_shapes: False
      profile_memory: False
      with_stack: False
      with_flops: False
      with_modules: True
      export_tensorboard: True
      export_chrome_trace: False
      chrome_filename_prefix: "chrome_trace"
      schedule_warmup: 2
      schedule_active: 1
      schedule_repeat: 1

reward:
  group_name: "RewardGroup"
  use_reward_model: false
  reward_type: 'math'
  reward_scale: 1.0                   # DAPO 风格: binary reward

  tokenizer:
    tokenizer_model: ${actor.tokenizer.tokenizer_model}
    use_fast: ${actor.tokenizer.use_fast}
    trust_remote_code: ${actor.tokenizer.trust_remote_code}
    padding_side: ${actor.tokenizer.padding_side}

critic:
  use_critic_model: false             # GRPO 不需要 critic
